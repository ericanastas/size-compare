name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: size-compare-app
  REGION: us-central1
  SERVICE: size-compare

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/315090700387/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@size-compare-app.iam.gserviceaccount.com

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
          source: .
          flags: --allow-unauthenticated --min-instances=0 --max-instances=2 --port=8080

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
